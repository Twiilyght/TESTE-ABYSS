<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss RPG - Ficha Digital </title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
    
    /* Modificações na Sidebar para permitir retração */
.sidebar { 
    position: fixed; 
    left: 0; 
    top: 0; 
    height: 100%; 
    width: 250px; /* Largura dela aberta */
    background: #000; 
    border-right: 1px solid var(--border-color); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding-top: 20px; 
    z-index: 1000; 
    transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efeito de deslize */
    overflow: hidden; /* Esconde os botões quando retrai */
}

/* Estado da Sidebar quando estiver fechada */
.sidebar.closed { 
    width: 60px; 
}

/* O container principal agora deve reagir à barra */
.container { 
    max-width: 1400px; 
    margin: 0 auto 0 260px; /* Margem quando aberta */
    flex-grow: 1; 
    padding: 40px 20px; 
    transition: margin-left 0.4s; 
}

/* Quando a barra fecha, o conteúdo ganha mais espaço */
.sidebar.closed + .container {
    margin-left: 80px;
}

/* Estilo do Botão Hambúrguer */
.menu-toggle {
    background: none;
    border: none;
    cursor: pointer;
    margin-bottom: 30px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px;
}

.hamburger-line {
    width: 30px;
    height: 3px;
    background-color: var(--text-gold);
    transition: 0.3s;
}

/* Esconder os botões de atalho quando fechado (opcional, ou eles ficam empilhados) */
.sidebar.closed .sidebar-btn {
    opacity: 0;
    pointer-events: none;
}
    
        :root {
            --bg-dark: #050507;
            --panel-bg: rgba(21, 21, 26, 0.95);
            --primary-purple: #7b1fa2;
            --light-purple: #bc4ed8;
            --text-gold: #d4af37;
            --text-light: #f0f0f0;
            --border-color: #4a3427;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Quicksand', sans-serif; margin: 0; display: flex; overflow-x: hidden; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 70px; background: #000; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 40px; z-index: 1000; }
        .sidebar-btn { background: rgba(255,255,255,0.03); border: 1px solid transparent; color: var(--text-gold); font-size: 1.6rem; cursor: pointer; margin-bottom: 30px; width: 50px; height: 50px; border-radius: 12px; transition: 0.4s; display: flex; align-items: center; justify-content: center; }
        .sidebar-btn.active { border-color: var(--light-purple); box-shadow: 0 0 15px var(--primary-purple); background: rgba(123, 31, 162, 0.2); }

        .container { max-width: 1400px; margin: 0 auto 0 100px; flex-grow: 1; padding: 40px 20px; }
        .title { font-family: 'Cinzel', serif; text-align: center; color: var(--primary-purple); text-shadow: 0 0 20px rgba(123, 31, 162, 0.5); letter-spacing: 8px; font-size: 3rem; margin-bottom: 40px; }

        .page-area { display: none; }
        .page-area.active { display: block; }

        .section-box { background: var(--panel-bg); border: 1px solid var(--border-color); margin-bottom: 30px; padding: 35px 20px 20px; border-radius: 8px; position: relative; }
        .section-title { font-family: 'Cinzel', serif; position: absolute; top: -12px; left: 25px; background: var(--bg-dark); padding: 0 15px; color: var(--text-gold); font-size: 0.9rem; letter-spacing: 2px; }

        /* ATRIBUTOS COM ANIMAÇÃO */
        .attributes-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; }
        .attr-container-outer { position: relative; width: 110px; height: 125px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .attr-container-outer:hover { transform: translateY(-10px); filter: drop-shadow(0 0 15px var(--primary-purple)); }
        .attr-hexagon-border { position: absolute; width: 100%; height: 100%; background: var(--primary-purple); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; }
        .attr-hexagon-inner { width: 94%; height: 94%; background: #0c0c10; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .attr-value-input { background: transparent; border: none; color: #fff; font-family: 'Cinzel'; font-size: 2rem; width: 60px; text-align: center; outline: none; }
        
        /* DIFICULDADE */
        .difficulty-selector { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .diff-btn { background: #111; border: 1px solid #333; color: #666; padding: 10px 25px; cursor: pointer; font-family: 'Cinzel'; border-radius: 4px; transition: 0.3s; }
        .diff-btn.active { border-color: var(--text-gold); color: var(--text-gold); background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* PERÍCIAS FINAS */
        .skills-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px; }
        .skill-item { 
            background: rgba(0,0,0,0.3); border: 1px solid #2a2a2a; padding: 6px 10px; 
            display: flex; align-items: center; justify-content: space-between; 
            border-left: 3px solid var(--primary-purple); border-radius: 4px; 
            cursor: pointer; transition: 0.2s; 
        }
        .skill-item:hover { background: rgba(123, 31, 162, 0.1); border-color: var(--light-purple); }
        .skill-name { font-size: 0.85rem; font-weight: bold; color: #ddd; }
        
        /* COMBATE GRID */
        .abilities-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .spell-section { grid-column: 1 / -1; }

        .hab-card { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 20px; border-left: 5px solid var(--primary-purple); border-radius: 4px; margin-bottom: 15px; position: relative; }
        .hab-desc-render { color: #aaa; font-size: 0.9rem; margin: 10px 0; white-space: pre-wrap; }
        .hab-desc-render img { max-width: 100%; border-radius: 4px; margin-top: 10px; border: 1px solid #333; }
        
        .btn-roll { padding: 8px 15px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; border: 1px solid; background: transparent; margin-right: 8px; margin-top: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-forge { background: var(--primary-purple); color: #fff; border: none; padding: 12px; width: 100%; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; margin-bottom: 20px; transition: 0.2s; }

        /* POPUP ORNAMENTADO REDUZIDO */
        #central-popup {
            position: fixed; bottom: 20px; right: 20px; width: 320px; 
            background: #0c0c12; border: 2px solid var(--text-gold); 
            padding: 15px; z-index: 9999; text-align: center; font-family: 'Cinzel', serif;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            opacity: 0; pointer-events: none;
            transform: translateX(120%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        #central-popup.active { opacity: 1; transform: translateX(0); pointer-events: all; }
        .ornament { position: absolute; width: 30px; height: 30px; border: 1px solid var(--text-gold); }
        .tl { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .tr { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .bl { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .br { bottom: -5px; right: -5px; border-left: none; border-top: none; }
        .pop-close-btn { position: absolute; right: 8px; top: 5px; color: var(--text-gold); cursor: pointer; font-size: 0.8rem; }

        /* EDITOR DE TEXTO */
        .editor-toolbar { display: flex; gap: 5px; margin-bottom: 10px; background: #111; padding: 5px; border-radius: 4px; }
        .toolbar-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 0.8rem; }
        .toolbar-btn:hover { background: var(--primary-purple); }
        .modal-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; }
        .tab-btn { background: none; border: none; color: #666; padding: 10px; cursor: pointer; font-family: 'Cinzel'; }
        .tab-btn.active { color: var(--text-gold); border-bottom: 2px solid var(--text-gold); }

        .pop-total-text { font-size: 2.8rem; color: var(--text-gold); margin: 0; }
        .pop-status-text { font-size: 1.3rem; margin: 5px 0; font-weight: bold; }
        .pop-detail-text { font-family: 'Quicksand'; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }

        /* MODAIS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 650px; max-height: 90vh; overflow-y: auto; background: #0a0a0c; border: 2px solid var(--text-gold); padding: 30px; z-index: 10000; border-radius: 8px; }
        .modal-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; font-family: 'Quicksand'; }
   /* --- ESTILO DAS BARRAS SUPERIORES --- */
.header-status-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 0 auto 30px auto;
    max-width: 500px; /* Largura centralizada */
    background: rgba(0, 0, 0, 0.4);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}

.status-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.status-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--text-gold);
    width: 25px;
    font-weight: bold;
}

.status-bar-bg {
    flex-grow: 1;
    height: 4px; /* Barra fina conforme solicitado */
    background: #000;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.status-fill {
    height: 100%;
    transition: width 0.3s ease-out;
}

/* Cores Solicitadas com Brilho Neon */
.bg-red { background: #ff1744; box-shadow: 0 0 8px #ff1744; }
.bg-gold { background: #ffca28; box-shadow: 0 0 8px #ffca28; }
.bg-cyan { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; }

.status-controls {
    display: flex;
    align-items: center;
    gap: 4px;
}

.status-controls input {
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Quicksand';
    font-size: 0.85rem;
    width: 35px;
    text-align: center;
}

.arrow-btn {
    background: none;
    border: none;
    color: var(--primary-purple);
    cursor: pointer;
    font-size: 0.7rem;
    transition: 0.2s;
}

.arrow-btn:hover { color: var(--light-purple); transform: scale(1.2); }
.sep { color: #555; font-size: 0.8rem; }
   
    </style>
</head>
<body>

<div class="sidebar">
    <button class="sidebar-btn active" id="btn-ficha" onclick="mudarArea('ficha')">📜</button>
    <button class="sidebar-btn" id="btn-combate" onclick="mudarArea('combate')">⚔️</button>
    <button class="sidebar-btn" onclick="salvarNoNavegador()">💾</button>
</div>

<div class="container">
    <div style="text-align: right; margin-bottom: -20px;">
       <div class="container">
    <div style="text-align: right; margin-bottom: 10px;">
        <input type="text" id="user-nickname" placeholder="Nickname" style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); color: var(--text-gold); text-align: right; outline: none; font-family: 'Cinzel';">
    </div>
    <h1 class="title" style="margin-bottom: 10px;">Abyss RPG</h1>

    <!-- NOVAS BARRAS DE RECURSOS -->
    <div class="header-status-container">
        <!-- Vida (PV) -->
        <div class="status-row">
            <span class="status-label">[PV]</span>
            <div class="status-bar-bg"><div id="bar-pv" class="status-fill bg-red" style="width: 100%;"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('pv', -1)">◀</button>
                <input type="number" id="curr-pv" value="20" onchange="updateBar('pv')">
                <span class="sep">/</span>
                <input type="number" id="max-pv" value="20" onchange="updateBar('pv')">
                <button class="arrow-btn" onclick="changeStat('pv', 1)">▶</button>
            </div>
        </div>

        <!-- Arcanismo (PA) -->
        <div class="status-row">
            <span class="status-label">[PA]</span>
            <div class="status-bar-bg"><div id="bar-pa" class="status-fill bg-gold" style="width: 100%;"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('pa', -1)">◀</button>
                <input type="number" id="curr-pa" value="10" onchange="updateBar('pa')">
                <span class="sep">/</span>
                <input type="number" id="max-pa" value="10" onchange="updateBar('pa')">
                <button class="arrow-btn" onclick="changeStat('pa', 1)">▶</button>
            </div>
        </div>

        <!-- Sanidade (PS) -->
        <div class="status-row">
            <span class="status-label">[PS]</span>
            <div class="status-bar-bg"><div id="bar-ps" class="status-fill bg-cyan" style="width: 100%;"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('ps', -1)">◀</button>
                <input type="number" id="curr-ps" value="15" onchange="updateBar('ps')">
                <span class="sep">/</span>
                <input type="number" id="max-ps" value="15" onchange="updateBar('ps')">
                <button class="arrow-btn" onclick="changeStat('ps', 1)">▶</button>
            </div>
        </div>
    </div>

    <div id="area-ficha" class="page-area active">
        <section class="section-box">
            <div class="section-title">Atributos</div>
            <div id="attr-container" class="attributes-grid"></div>
        </section>

        <div class="difficulty-selector">
            <button class="diff-btn" id="df-facil" onclick="setDif('facil')">FÁCIL</button>
            <button class="diff-btn active" id="df-normal" onclick="setDif('normal')">NORMAL</button>
            <button class="diff-btn" id="df-dificil" onclick="setDif('dificil')">DIFÍCIL</button>
        </div>

        <section class="section-box">
            <div class="section-title">Perícias</div>
            <div id="skills-container" class="skills-list"></div>
        </section>
    </div>

    <div id="area-combate" class="page-area">
        <div class="abilities-columns">
            <section class="section-box">
                <div class="section-title">Ataques</div>
                <button class="btn-forge" onclick="abrirEditorHab('ataque')">+ Forjar Novo Ataque</button>
                <div id="ataques-lista"></div>
            </section>
            <section class="section-box">
                <div class="section-title">Habilidades</div>
                <button class="btn-forge" onclick="abrirEditorHab('habilidade')">+ Forjar Nova Habilidade</button>
                <div id="habilidades-lista"></div>
            </section>
        </div>
        <section class="section-box spell-section">
            <div class="section-title">Feitiços</div>
            <button class="btn-forge" onclick="abrirEditorHab('feitico')">+ Forjar Novo Feitiço</button>
            <div id="feiticos-lista" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        </section>
    </div>
</div>

<div id="central-popup">
    <div class="ornament tl"></div><div class="ornament tr"></div>
    <div class="ornament bl"></div><div class="ornament br"></div>
    <span class="pop-close-btn" onclick="fecharPopup()">✕</span>
    <div id="pop-content"></div>
</div>

<div id="modal-hab" class="modal">
    <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-info')">Informações</button>
        <button class="tab-btn" onclick="switchTab('tab-media')">Mídia/Imagem</button>
    </div>

    <div id="tab-info">
        <input type="hidden" id="hab-tipo">
        <label style="color:var(--text-gold); font-size:0.8rem">NOME DA HABILIDADE</label>
        <input type="text" id="hab-nome" class="modal-input">
        
        <label style="color:var(--text-gold); font-size:0.8rem">DANO / ROLAGEM PRINCIPAL</label>
        <input type="text" id="hab-dano" class="modal-input" placeholder="Ex: 2d10 + 5">

        <div class="editor-toolbar">
            <button class="toolbar-btn" onclick="formatText('**')"><b>B</b></button>
            <button class="toolbar-btn" onclick="formatText('*')"><i>I</i></button>
            <button class="toolbar-btn" onclick="formatText('<u>', '</u>')"><u>U</u></button>
            <button class="toolbar-btn" onclick="formatText('~~')"><s>S</s></button>
        </div>
        <textarea id="hab-desc" class="modal-input" rows="6" placeholder="Descrição da habilidade..."></textarea>
        
        <div id="rolagens-extras-container"></div>
        <button onclick="addInputRolagem()" style="background:none; border:1px solid var(--primary-purple); color:var(--light-purple); cursor:pointer; padding:5px; margin-bottom:15px; width:100%">+ Adicionar Rolagem Opcional</button>
    </div>

    <div id="tab-media" style="display:none">
        <label style="color:var(--text-gold); font-size:0.8rem">LINK DA IMAGEM / ÍCONE</label>
        <input type="text" id="hab-img" class="modal-input" placeholder="https://link-da-imagem.png">
        <p style="font-size:0.7rem; color:#666">A imagem aparecerá ao final da descrição.</p>
    </div>

    <button onclick="salvarHabilidade()" style="width:100%; padding:15px; background:var(--primary-purple); color:#fff; border:none; font-family:Cinzel; cursor:pointer;">GRAVAR NO GRIMÓRIO</button>
    <button onclick="document.getElementById('modal-hab').style.display='none'" style="width:100%; margin-top:10px; background:none; border:1px solid #333; color:#eee; padding:10px; cursor:pointer;">Cancelar</button>
</div>

<script>
    let sheet = {
        atributos: {"FOR":1, "AGI":1, "INT":1, "CON":1, "POD":1},
        pericias: [],
        habilidades: [],
        dificuldade: 'normal'
    };

    const dtTabela = {
        facil: { falha: 9, sucesso: 10, bom: 20, extremo: 21 },
        normal: { falha: 12, sucesso: 13, bom: 20, extremo: 21 },
        dificil: { falha: 15, sucesso: 16, bom: 20, extremo: 21 }
    };

    const periciasDados = [
        { n: "Acrobacia", a: "AGI" }, { n: "Adestramento", a: "INT" }, { n: "Artes", a: "POD" },
        { n: "Alquimia", a: "INT" }, { n: "Arcanismo", a: "POD" }, { n: "Atletismo", a: "FOR" },
        { n: "Atualidades", a: "INT" }, { n: "Ciências", a: "INT" }, { n: "Crime", a: "AGI" },
        { n: "Diplomacia", a: "POD" }, { n: "Enganação", a: "POD" }, { n: "Fortitude", a: "CON" },
        { n: "Furtividade", a: "AGI" }, { n: "Iniciativa", a: "AGI" }, { n: "Intimidação", a: "POD" },
        { n: "Intuição", a: "POD" }, { n: "Investigação", a: "INT" }, { n: "Linguística", a: "POD" },
        { n: "Luta", a: "FOR" }, { n: "Medicina", a: "INT" }, { n: "Monstrologia", a: "INT" },
        { n: "Percepção", a: "POD" }, { n: "Pilotagem", a: "AGI" }, { n: "Pontaria", a: "AGI" },
        { n: "Profissão", a: "INT" }, { n: "Reflexos", a: "AGI" }, { n: "Religião", a: "POD" },
        { n: "Sobrevivência", a: "INT" }, { n: "Tática", a: "INT" }, { n: "Tecnologia", a: "INT" },
        { n: "Vontade", a: "POD" }
    ];

    function getNivelSucesso(dado, total) {
        const dts = dtTabela[sheet.dificuldade];
        if (dado === 1) return { txt: "FALHA CRÍTICA", cor: "#8b0000" };
        if (dado === 20 || total >= 21) return { txt: "SUCESSO EXTREMO", cor: "#00ff88" };
        if (total === 20) return { txt: "SUCESSO BOM", cor: "#7fffd4" }; // Verde-água
        if (total >= dts.sucesso) return { txt: "SUCESSO NORMAL", cor: "#4488ff" };
        return { txt: "FALHA", cor: "#ff4444" };
    }

    function spawnPopup(titulo, subtitulo, total, corStatus, txtStatus, detalhes = "") {
        document.getElementById('pop-content').innerHTML = `
            <div style="font-size: 0.9rem; color: #a385cc; letter-spacing: 1px;">${titulo}</div>
            <div style="height:1px; background:linear-gradient(90deg, transparent, var(--text-gold), transparent); margin: 8px 0;"></div>
            <div class="pop-detail-text">${subtitulo}</div>
            <div class="pop-status-text" style="color:${corStatus}">${txtStatus}</div>
            <div class="pop-total-text">${total}</div>
            <div style="font-size:0.75rem; color:#666; margin-top:3px;">${detalhes}</div>`;
        
        const pop = document.getElementById('central-popup');
        pop.classList.add('active');
        clearTimeout(window.popTimer);
        window.popTimer = setTimeout(fecharPopup, 6000);
    }

    function realizarRolagem(attrNome, bonusManual, nomeDisplay, isPericia = false, periciaNome = "") {
        let attrValor = sheet.atributos[attrNome];
        let bonusTotal = bonusManual;

        if(isPericia) {
            let p = sheet.pericias.find(x => x.n === periciaNome);
            if(p) bonusTotal = parseInt(p.t) + parseInt(p.m);
        }

        let rolagens = [];
        let final;
        if(attrValor <= 0) {
            rolagens = [Math.floor(Math.random()*20)+1, Math.floor(Math.random()*20)+1];
            final = Math.min(...rolagens);
        } else {
            for(let i=0; i<attrValor; i++) rolagens.push(Math.floor(Math.random()*20)+1);
            final = Math.max(...rolagens);
        }
        
        const total = final + bonusTotal;
        const res = getNivelSucesso(final, total);
        spawnPopup(nomeDisplay.toUpperCase(), `Dados: [${rolagens.join(', ')}]`, total, res.cor, res.txt, `Soma: ${final} + ${bonusTotal}`);
    }

    function rolarDados(formula) {
        try {
            const clean = formula.toLowerCase().replace(/\s/g, '');
            const parts = clean.split(/([+-])/);
            let total = 0;
            parts.forEach((p, i) => {
                if (p === '+' || p === '-') return;
                let val = 0;
                if (p.includes('d')) {
                    const [qtdStr, facesStr] = p.split('d');
                    let qtd = parseInt(qtdStr);
                    if (isNaN(qtd)) qtd = 1;
                    let faces = parseInt(facesStr);
                    for(let j=0; j<qtd; j++) val += Math.floor(Math.random()*faces)+1;
                } else { val = parseInt(p) || 0; }
                const op = parts[i-1] === '-' ? -1 : 1;
                total += (val * op);
            });
            return total;
        } catch(e) { return 0; }
    }

    function formatText(tagStart, tagEnd = tagStart) {
        const area = document.getElementById('hab-desc');
        const start = area.selectionStart;
        const end = area.selectionEnd;
        const text = area.value;
        area.value = text.substring(0, start) + tagStart + text.substring(start, end) + tagEnd + text.substring(end);
    }

    function renderMarkdown(t) {
        return t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/~~(.*?)~~/g, '<s>$1</s>')
                .replace(/<u>(.*?)<\/u>/g, '<u>$1</u>');
    }

    function render() {
        document.getElementById('attr-container').innerHTML = Object.entries(sheet.atributos).map(([k,v]) => `
            <div class="attr-container-outer" onclick="realizarRolagem('${k}', 0, 'Teste de ${k}')">
                <div class="attr-hexagon-border"><div class="attr-hexagon-inner">
                    <input type="number" class="attr-value-input" value="${v}" onchange="sheet.atributos['${k}']=parseInt(this.value)||0" onclick="event.stopPropagation()">
                    <span style="font-size:0.75rem; color:var(--text-gold); font-weight:bold;">${k}</span>
                </div></div>
            </div>`).join('');

        document.getElementById('skills-container').innerHTML = sheet.pericias.map(p => `
            <div class="skill-item" onclick="realizarRolagem('${p.a}', 0, '${p.n}', true, '${p.n}')">
                <div><span class="skill-name">${p.n}</span><br><small style="color:#666">${p.a}</small></div>
                <div style="display:flex; gap:5px" onclick="event.stopPropagation()">
                    <select onchange="atualizarPericia('${p.n}', 't', this.value)" style="background:#000; color:var(--light-purple); border:1px solid #444;">
                        <option value="0" ${p.t==0?'selected':''}>+0</option>
                        <option value="2" ${p.t==2?'selected':''}>+2</option>
                        <option value="4" ${p.t==4?'selected':''}>+4</option>
                    </select>
                    <input type="number" value="${p.m}" onchange="atualizarPericia('${p.n}', 'm', this.value)" style="width:35px; background:#000; color:var(--text-gold); border:1px solid #444; text-align:center;">
                </div>
            </div>`).join('');
        renderAbilities();
    }

    function renderAbilities() {
        const listas = { ataque: 'ataques-lista', habilidade: 'habilidades-lista', feitico: 'feiticos-lista' };
        Object.values(listas).forEach(id => document.getElementById(id).innerHTML = '');
        sheet.habilidades.forEach((h, i) => {
            const card = document.createElement('div');
            card.className = 'hab-card';
            card.innerHTML = `
                <button onclick="removerHab(${i})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:red; cursor:pointer;">✕</button>
                <h3 style="font-family:Cinzel; color:var(--text-gold); margin:0;">${h.nome}</h3>
                <div class="hab-desc-render">${renderMarkdown(h.desc)}</div>
                ${h.img ? `<img src="${h.img}" style="max-width:100%; display:block; margin:10px 0; border-radius:4px;">` : ''}
                ${h.dano ? `<button class="btn-roll" style="color:#ff4444; border-color:#ff4444;" onclick="spawnPopup('${h.nome}', 'Rolagem Principal', rolarDados('${h.dano}'), 'var(--text-gold)', 'DANO')">⚔️ ${h.dano}</button>` : ''}
                ${h.extras.map(ex => `<button class="btn-roll" style="color:var(--light-purple); border-color:var(--light-purple);" onclick="spawnPopup('${h.nome}', 'Rolagem Extra', rolarDados('${ex}'), 'var(--light-purple)', 'BÔNUS')">🎲 ${ex}</button>`).join('')}
            `;
            document.getElementById(listas[h.tipo]).appendChild(card);
        });
    }

    function switchTab(id) {
        document.getElementById('tab-info').style.display = id === 'tab-info' ? 'block' : 'none';
        document.getElementById('tab-media').style.display = id === 'tab-media' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(id)));
    }

    function abrirEditorHab(t) { 
        document.getElementById('hab-tipo').value = t; 
        document.getElementById('modal-hab').style.display='block'; 
        switchTab('tab-info');
    }

    function addInputRolagem() {
        const div = document.createElement('div');
        div.innerHTML = `<input type="text" class="modal-input extra-roll" placeholder="Outra rolagem (ex: 1d4)">`;
        document.getElementById('rolagens-extras-container').appendChild(div);
    }

    function salvarHabilidade() {
        const h = {
            tipo: document.getElementById('hab-tipo').value,
            nome: document.getElementById('hab-nome').value,
            dano: document.getElementById('hab-dano').value,
            desc: document.getElementById('hab-desc').value,
            img: document.getElementById('hab-img').value,
            extras: Array.from(document.querySelectorAll('.extra-roll')).map(i => i.value).filter(v => v)
        };
        sheet.habilidades.push(h);
        renderAbilities();
        document.getElementById('modal-hab').style.display='none';
    }

    function removerHab(i) { sheet.habilidades.splice(i, 1); renderAbilities(); }
    function fecharPopup() { document.getElementById('central-popup').classList.remove('active'); }
    function setDif(v) { sheet.dificuldade = v; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); document.getElementById('df-'+v).classList.add('active'); }
    function mudarArea(a) { 
        document.querySelectorAll('.page-area').forEach(e => e.classList.remove('active'));
        document.getElementById('area-'+a).classList.add('active');
        document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+a).classList.add('active');
    }
    function atualizarPericia(n, c, v) { let p = sheet.pericias.find(x => x.n === n); if(p) p[c] = parseInt(v) || 0; }
    function salvarFicha() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(sheet)], {type: 'application/json'}));
        a.download = 'ficha_abyss.json'; a.click();
    }

    window.onload = () => {
    // Primeiro cria a estrutura básica de perícias
    sheet.pericias = periciasDados.map(p => ({ ...p, t: 0, m: 0 }));
    
    // Depois tenta carregar o que está salvo no navegador
    carregarDoNavegador();
    
    // Se não tinha nada salvo, o render() padrão rodará dentro do carregar ou aqui
    render(); 
};
    
    function updateBar(id) {
    const current = parseInt(document.getElementById(`curr-${id}`).value) || 0;
    const max = parseInt(document.getElementById(`max-${id}`).value) || 1;
    const percentage = Math.min(Math.max((current / max) * 100, 0), 100);
    document.getElementById(`bar-${id}`).style.width = percentage + "%";
}

function changeStat(id, amount) {
    const input = document.getElementById(`curr-${id}`);
    const max = parseInt(document.getElementById(`max-${id}`).value) || 0;
    let newVal = parseInt(input.value) + amount;
    
    // Trava entre 0 e o valor máximo definido pelo jogador
    if (newVal < 0) newVal = 0;
    if (newVal > max) newVal = max;
    
    input.value = newVal;
    updateBar(id);
}

// Inicializa o visual das barras ao carregar
window.addEventListener('load', () => {
    ['pv', 'pa', 'ps'].forEach(updateBar);
});

function salvarNoNavegador() {
    // Captura os valores atuais dos recursos (PV, PA, PS) antes de salvar
    const recursos = {
        pv: { curr: document.getElementById('curr-pv').value, max: document.getElementById('max-pv').value },
        pa: { curr: document.getElementById('curr-pa').value, max: document.getElementById('max-pa').value },
        ps: { curr: document.getElementById('curr-ps').value, max: document.getElementById('max-ps').value }
    };

    // Monta o objeto completo para salvar
    const dadosParaSalvar = {
        nickname: document.getElementById('user-nickname').value,
        atributos: sheet.atributos,
        habilidades: sheet.habilidades,
        recursos: recursos,
        dificuldade: sheet.dificuldade
    };

    // Salva no localStorage com a chave 'ficha_abyss_v1'
    localStorage.setItem('ficha_abyss_v1', JSON.stringify(dadosParaSalvar));
    
    alert("Progresso salvo no navegador!");
}
function carregarDoNavegador() {
    const salvo = localStorage.getItem('ficha_abyss_v1');
    
    if (salvo) {
        const dados = JSON.parse(salvo);
        
        // 1. Restaura Nickname
        document.getElementById('user-nickname').value = dados.nickname || "";
        
        // 2. Restaura Atributos e Habilidades no objeto 'sheet'
        sheet.atributos = dados.atributos;
        sheet.habilidades = dados.habilidades;
        sheet.dificuldade = dados.dificuldade || 'normal';
        
        // 3. Restaura os inputs de recursos (PV, PA, PS)
        if (dados.recursos) {
            ['pv', 'pa', 'ps'].forEach(id => {
                document.getElementById(`curr-${id}`).value = dados.recursos[id].curr;
                document.getElementById(`max-${id}`).value = dados.recursos[id].max;
            });
        }

        // 4. Re-renderiza a interface para mostrar os dados novos
        render(); 
        setDif(sheet.dificuldade);
        ['pv', 'pa', 'ps'].forEach(updateBar);
        
        console.log("Ficha carregada do armazenamento local.");
    }
}

</script>
