<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha RPG - Sistema Abyss</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #15151a;
            --primary-purple: #6a1b9a;
            --light-purple: #9c4dcc;
            --text-gold: #c5a059;
            --text-light: #e0e0e0;
            --border-color: #3e2723;
            
            --crit-fail: #660000;
            --fail: #ff5252;
            --success: #448aff;
            --good-success: #00d4ff;
            --crit-success: #00e676;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Quicksand', sans-serif;
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle, #1a0a2e 0%, #0a0a0c 100%);
        }

        .container { max-width: 1100px; margin: 0 auto; }
        .title { font-family: 'Cinzel', serif; text-align: center; color: var(--primary-purple); text-shadow: 0 0 10px rgba(156, 77, 204, 0.5); text-transform: uppercase; margin-bottom: 30px; }

        .section-box {
            background: var(--panel-bg); border: 2px solid var(--border-color);
            border-radius: 0; margin-bottom: 20px; padding: 35px 20px 20px 20px; position: relative;
        }

        .section-title {
            font-family: 'Cinzel', serif; position: absolute; top: -14px; left: 20px;
            background: var(--bg-dark); padding: 0 10px; color: var(--text-gold); font-weight: bold;
        }

        /* ATRIBUTOS HEXAGONAIS */
        .attributes-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; padding: 10px 0; }
        .attr-container-outer { position: relative; width: 100px; height: 115px; filter: drop-shadow(0 0 5px rgba(156, 77, 204, 0.4)); transition: 0.3s ease; }
        .attr-container-outer:hover { transform: translateY(-5px); filter: drop-shadow(0 0 12px rgba(156, 77, 204, 0.8)); }
        
        .attr-hexagon-border {
            position: absolute; width: 100%; height: 100%; background: var(--primary-purple);
            clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
            display: flex; justify-content: center; align-items: center;
        }
        .attr-hexagon-inner {
            width: 92%; height: 92%; background: #08080a;
            clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .attr-value-input { 
            background: transparent; border: none; color: #fff; font-family: 'Cinzel', serif; font-size: 2.5rem;
            width: 70px; text-align: center; outline: none; margin-top: 5px;
        }
        .attr-name { font-size: 0.75rem; color: var(--light-purple); font-weight: bold; text-transform: uppercase; margin-top: -4px; }
        .d20-emoji-attr { font-size: 1.3rem; cursor: pointer; transition: 0.2s; margin-top: 2px; }

        /* DIFICULDADE */
        .difficulty-selector { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .diff-btn {
            background: #111; border: 1px solid var(--border-color); color: #555;
            padding: 10px 25px; cursor: pointer; font-family: 'Cinzel'; transition: 0.3s;
        }
        .diff-btn:hover { border-color: var(--light-purple); color: var(--text-light); box-shadow: 0 0 15px rgba(156, 77, 204, 0.3); }
        .diff-btn.active { border-color: var(--text-gold); color: var(--text-gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }

        /* PERÍCIAS */
        .skills-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .skill-item {
            background: #000; border: 1px solid var(--border-color);
            padding: 8px 12px; display: flex; align-items: center; justify-content: space-between;
            transition: all 0.3s ease; cursor: pointer; border-left: 3px solid var(--primary-purple);
        }
        .skill-item:hover { 
            transform: translateY(-3px); 
            border-color: var(--light-purple); 
            box-shadow: 0 5px 15px rgba(156, 77, 204, 0.2);
            background: #0a0a0f;
        }
        .skill-info { flex-grow: 1; pointer-events: none; }
        .skill-attr { font-size: 0.7rem; color: #666; font-family: 'Cinzel'; }

        .skill-controls { display: flex; gap: 5px; align-items: center; }
        .skill-select {
            background: #111; border: 1px solid #333; color: var(--light-purple);
            font-size: 0.8rem; padding: 2px; cursor: pointer; outline: none;
        }
        .skill-mod-input {
            width: 35px; background: #1a1a1a; border: 1px solid #333; color: var(--text-gold);
            text-align: center; font-family: 'Cinzel'; outline: none; font-size: 0.9rem; padding: 2px 0;
        }

        /* POPUP LATERAL */
        #dice-popup {
            position: fixed; bottom: 20px; right: -400px;
            width: 320px; background: var(--panel-bg); border: 2px solid var(--text-gold);
            padding: 25px; z-index: 9999; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            transition: right 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        #dice-popup.active { right: 20px; }
        .popup-header { font-family: 'Cinzel'; color: var(--light-purple); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .popup-result-label { font-family: 'Cinzel'; font-size: 2rem; margin: 10px 0; }
        .popup-total { font-family: 'Cinzel'; font-size: 2.8rem; color: var(--text-gold); margin-top: 5px; }

        #save-btn { display: block; margin: 40px auto; background: transparent; border: 1px solid var(--text-gold); color: var(--text-gold); padding: 12px 60px; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s; }
        #save-btn:hover { background: var(--text-gold); color: #000; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Abyss System</h1>

        <section class="section-box">
            <div class="section-title">Atributos</div>
            <div id="attr-container" class="attributes-grid"></div>
        </section>

        <div class="difficulty-selector">
            <button class="diff-btn" id="btn-facil" onclick="definirDificuldade('facil')">Fácil</button>
            <button class="diff-btn active" id="btn-normal" onclick="definirDificuldade('normal')">Normal</button>
            <button class="diff-btn" id="btn-dificil" onclick="definirDificuldade('dificil')">Difícil</button>
        </div>

        <section class="section-box">
            <div class="section-title">Perícias</div>
            <div id="skills-container" class="skills-list"></div>
        </section>

        <button id="save-btn" onclick="salvarFicha()">Sincronizar com o Abismo</button>
    </div>

    <div id="dice-popup">
        <div id="popup-content"></div>
    </div>

    <script>
        const characterData = {
            atributos: { "FOR": 1, "AGI": 1, "INT": 1, "CON": 1, "POD": 1 },
            pericias: [
                { n: "Acrobacia", a: "AGI", t: 0, m: 0 }, { n: "Adestramento", a: "INT", t: 0, m: 0 },
                { n: "Artes", a: "POD", t: 0, m: 0 }, { n: "Alquimia", a: "INT", t: 0, m: 0 },
                { n: "Arcanismo", a: "POD", t: 0, m: 0 }, { n: "Atletismo", a: "FOR", t: 0, m: 0 },
                { n: "Atualidades", a: "INT", t: 0, m: 0 }, { n: "Ciências", a: "INT", t: 0, m: 0 },
                { n: "Crime", a: "AGI", t: 0, m: 0 }, { n: "Diplomacia", a: "POD", t: 0, m: 0 },
                { n: "Enganação", a: "POD", t: 0, m: 0 }, { n: "Fortitude", a: "CON", t: 0, m: 0 },
                { n: "Furtividade", a: "AGI", t: 0, m: 0 }, { n: "Iniciativa", a: "AGI", t: 0, m: 0 },
                { n: "Intimidação", a: "POD", t: 0, m: 0 }, { n: "Intuição", a: "POD", t: 0, m: 0 },
                { n: "Investigação", a: "INT", t: 0, m: 0 }, { n: "Linguística", a: "POD", t: 0, m: 0 },
                { n: "Luta", a: "FOR", t: 0, m: 0 }, { n: "Medicina", a: "INT", t: 0, m: 0 },
                { n: "Monstrologia", a: "INT", t: 0, m: 0 }, { n: "Percepção", a: "POD", t: 0, m: 0 },
                { n: "Pilotagem", a: "AGI", t: 0, m: 0 }, { n: "Pontaria", a: "AGI", t: 0, m: 0 },
                { n: "Profissão", a: "INT", t: 0, m: 0 }, { n: "Reflexos", a: "AGI", t: 0, m: 0 },
                { n: "Religião", a: "POD", t: 0, m: 0 }, { n: "Sobrevivência", a: "INT", t: 0, m: 0 },
                { n: "Tática", a: "INT", t: 0, m: 0 }, { n: "Tecnologia", a: "INT", t: 0, m: 0 },
                { n: "Vontade", a: "POD", t: 0, m: 0 }
            ]
        };

        let dif = 'normal';
        const thresholds = { facil: 9, normal: 12, dificil: 15 };

        function renderAll() {
            document.getElementById('attr-container').innerHTML = Object.entries(characterData.atributos).map(([k, v]) => `
                <div class="attr-container-outer">
                    <div class="attr-hexagon-border"><div class="attr-hexagon-inner">
                        <input class="attr-value-input" type="number" value="${v}" onchange="characterData.atributos['${k}']=parseInt(this.value)||0">
                        <span class="attr-name">${k}</span>
                        <div class="d20-emoji-attr" onclick="rolar('${k}', characterData.atributos['${k}'], 0, true)">🎲</div>
                    </div></div>
                </div>
            `).join('');

            document.getElementById('skills-container').innerHTML = characterData.pericias.map((s, i) => `
                <div class="skill-item" onclick="prepararRolagem(${i})">
                    <div class="skill-info">
                        <div style="font-weight:bold">${s.n}</div>
                        <div class="skill-attr">${s.a}</div>
                    </div>
                    <div class="skill-controls" onclick="event.stopPropagation()">
                        <select class="skill-select" id="treino-${i}" onchange="characterData.pericias[${i}].t=parseInt(this.value)">
                            <option value="0" ${s.t==0?'selected':''}>+0</option>
                            <option value="2" ${s.t==2?'selected':''}>+2</option>
                            <option value="4" ${s.t==4?'selected':''}>+4</option>
                        </select>
                        <input type="number" class="skill-mod-input" id="mod-${i}" value="${s.m}" 
                            onchange="characterData.pericias[${i}].m=parseInt(this.value)||0">
                    </div>
                </div>
            `).join('');
        }

        function prepararRolagem(index) {
            const s = characterData.pericias[index];
            const atributoValor = characterData.atributos[s.a];
            const treino = parseInt(document.getElementById(`treino-${index}`).value);
            const modExtra = parseInt(document.getElementById(`mod-${index}`).value) || 0;
            rolar(s.n, atributoValor, treino + modExtra);
        }

        function definirDificuldade(n) {
            dif = n;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + n).classList.add('active');
        }

        function rolar(label, qtdAtributo, totalMod, isPuro = false) {
            let dados = [];
            let qtdEfetiva = qtdAtributo <= 0 ? 2 : qtdAtributo;
            for (let i = 0; i < qtdEfetiva; i++) dados.push(Math.floor(Math.random() * 20) + 1);

            let dadoBase = (qtdAtributo <= 0) ? Math.min(...dados) : Math.max(...dados);
            let totalFinal = dadoBase + totalMod;
            let status = "";
            let cor = "";

            if (dadoBase === 1) { status = "FALHA CRÍTICA"; cor = "var(--crit-fail)"; }
            else if (dadoBase === 20) { status = "SUCESSO EXTREMO"; cor = "var(--crit-success)"; }
            else if (dadoBase <= thresholds[dif]) { status = "FALHA"; cor = "var(--fail)"; }
            else {
                if (totalFinal >= 20) { status = "SUCESSO BOM"; cor = "var(--good-success)"; }
                else { status = "SUCESSO"; cor = "var(--success)"; }
            }

            const html = `
                <div class="popup-header">${label}</div>
                <div style="font-size: 0.75rem; opacity: 0.6; margin-bottom: 5px;">DIFICULDADE: ${dif.toUpperCase()}</div>
                <div style="margin-bottom: 5px">Dados: [${dados.join(', ')}]</div>
                <div class="popup-result-label" style="color: ${cor}">${status}</div>
                <div style="font-size: 0.9rem">Dado: ${dadoBase} ${totalMod !== 0 ? `+ Mod: ${totalMod}` : ''}</div>
                <div class="popup-total">TOTAL: ${totalFinal}</div>
            `;

            const p = document.getElementById('dice-popup');
            document.getElementById('popup-content').innerHTML = html;
            p.classList.add('active');
            
            clearTimeout(window.rollTimeout);
            window.rollTimeout = setTimeout(() => p.classList.remove('active'), 6000);
        }

        function salvarFicha() { localStorage.setItem('ficha_abyss_vFinal', JSON.stringify(characterData)); alert("Sincronizado!"); }

        window.onload = () => {
            const s = localStorage.getItem('ficha_abyss_vFinal');
            if(s) {
                const data = JSON.parse(s);
                characterData.atributos = data.atributos;
                characterData.pericias = data.pericias;
            }
            renderAll();
        };
    </script>
</body>
</html>
