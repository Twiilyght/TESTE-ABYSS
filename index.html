<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de RPG - Sistema Único</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">PERSONAGEM</h1>
        </header>

        <div class="difficulty-selector">
            <button class="diff-btn facil" data-nivel="facil" onclick="definirDificuldade('facil')">FÁCIL</button>
            <button class="diff-btn normal active" data-nivel="normal" onclick="definirDificuldade('normal')">NORMAL</button>
            <button class="diff-btn dificil" data-nivel="dificil" onclick="definirDificuldade('dificil')">DIFÍCIL</button>
        </div>
        
        <section id="attributes" class="section-box">
            <div class="section-title">Atributos</div>
            <div class="attributes-grid" id="attr-container">
                </div>
        </section>
        
        <section id="skills" class="section-box">
            <div class="section-title">Perícias</div>
            <div class="skills-list" id="skills-container">
                </div>
        </section>
    </div>

<section id="habilidades" class="section-box">
    <div class="section-title">Habilidades</div>
    <div id="habilidades-container">
        </div>
    <button class="add-hab-btn" onclick="adicionarHabilidade()">+ Adicionar Habilidade</button>
</section>

<div class="save-control">

    <div class="save-control">
            <button id="save-btn" onclick="salvarFicha()">SALVAR FICHA</button>
            <div id="save-feedback" style="display: none;">Ficha salva com sucesso!</div>
        </div>
    </div>

    <div id="dice-popup">
    <span class="popup-close" onclick="this.parentElement.style.display='none'">X</span>
    <div id="popup-content"></div>
</div>

    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
